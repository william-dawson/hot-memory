name: Build Singularity image

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-latest-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Build SIF
        run: apptainer build hotmemory.sif hotmemory.def

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: hotmemory-sif-${{ matrix.arch }}
          path: hotmemory.sif
          retention-days: 90

      - name: Rename SIF for release
        if: github.event_name == 'release'
        run: mv hotmemory.sif hotmemory-${{ matrix.arch }}.sif

      - name: Attach SIF to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: hotmemory-${{ matrix.arch }}.sif
